<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" width="1280" height="400" role="img" aria-label="GoPilates iOS — client work">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1A1A1A" stroke-width="0.5" stroke-opacity="0.06"/>
    </pattern>
    <style>
      .heading { font-family: 'Helvetica Neue', 'Arial Black', Helvetica, Arial, sans-serif; font-weight: 900; }
      .mono    { font-family: ui-monospace, 'SF Mono', Menlo, Consolas, 'Courier New', monospace; font-weight: 700; }
    </style>
  </defs>

  <rect width="1280" height="400" fill="#FFFDF5"/>
  <rect width="1280" height="400" fill="url(#grid)"/>

  <rect x="0" y="0" width="1280" height="36" fill="#CCFF00"/>
  <line x1="0" y1="36" x2="1280" y2="36" stroke="#1A1A1A" stroke-width="3"/>
  <text class="mono" x="640" y="24" text-anchor="middle" font-size="12" fill="#1A1A1A" letter-spacing="6">SWIFTUI · IOS 17+ · REVENUECAT · HEALTHKIT · LOTTIE · TENJIN · XCODEGEN</text>

  <text class="mono" x="60" y="100" font-size="13" fill="#1A1A1A" letter-spacing="6">CLIENT WORK / SHIPPED / LIVE ON THE APP STORE</text>

  <text class="heading" x="60" y="250" font-size="120" fill="#1A1A1A" letter-spacing="-4" textLength="900" lengthAdjust="spacingAndGlyphs">GOPILATES<tspan fill="#CCFF00">.</tspan></text>

  <text class="mono" x="60" y="310" font-size="14" fill="#1A1A1A" letter-spacing="4">/// 37-SCREEN ONBOARDING · FRENCH-FIRST · ~13K LOC SWIFT ///</text>

  <rect x="1080" y="80" width="140" height="140" fill="#CCFF00" stroke="#1A1A1A" stroke-width="6"/>
  <text class="mono" x="1150" y="138" text-anchor="middle" font-size="13" fill="#1A1A1A" letter-spacing="2">LIVE</text>
  <text class="mono" x="1150" y="158" text-anchor="middle" font-size="13" fill="#1A1A1A" letter-spacing="2">APP</text>
  <text class="mono" x="1150" y="178" text-anchor="middle" font-size="13" fill="#1A1A1A" letter-spacing="2">STORE</text>

  <text class="mono" x="60" y="378" font-size="12" fill="#1A1A1A" letter-spacing="4">/// PILATES · HEALTH · SUBSCRIPTION · iPHONE-ONLY · FREELANCE BUILD ///</text>
</svg>
