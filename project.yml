name: GoPilates
options:
  bundleIdPrefix: com.gopilates
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

packages:
  Lottie:
    url: https://github.com/airbnb/lottie-ios.git
    minorVersion: 4.5.0
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios-spm.git
    minorVersion: 5.16.0
    
targets:
  GoPilates:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: GoPilates
        excludes:
          - "**/.DS_Store"
          - "**/*.md"
    scheme:
      storeKitConfiguration: Configuration.storekit
    settings:
      base:
        PRODUCT_NAME: GoPilates
        PRODUCT_BUNDLE_IDENTIFIER: com.gopilates.app
        INFOPLIST_FILE: GoPilates/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: GoPilates/GoPilates.entitlements
        SWIFT_VERSION: 5.9
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        TARGETED_DEVICE_FAMILY: "1,2"
        IPHONEOS_DEPLOYMENT_TARGET: 18.0
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ULHJAB7ZT3
        ENABLE_PREVIEWS: YES
      configs:
        Debug:
          ONLY_ACTIVE_ARCH: YES
    dependencies:
      - sdk: HealthKit.framework
      - package: Lottie
        product: Lottie
      - package: RevenueCat
        product: RevenueCat
      - package: RevenueCat
        product: RevenueCatUI
